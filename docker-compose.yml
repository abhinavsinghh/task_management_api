version: "3.9"

services:
  db:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: taskdb

    ports:
      - "5432:5432"
    

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app

    depends_on:
      - db 